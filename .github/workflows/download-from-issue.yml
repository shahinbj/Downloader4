name: Auto Download from Issue

on:
  issues:
    types: [opened]

permissions:
  contents: write
  issues: write

concurrency:
  group: download-bot-${{ github.event.issue.number }}
  cancel-in-progress: false

jobs:
  download-and-reply:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: main

      - name: Extract URL from Issue
        id: get-url
        run: |
          BODY=$(cat << 'EOF'
          ${{ github.event.issue.body }}
          EOF
          )
          
          TITLE="${{ github.event.issue.title }}"
          
          URL=$(echo "$BODY" | grep -o 'https://[^[:space:]]*' | head -1)
          
          if [ -z "$URL" ]; then
            URL=$(echo "$TITLE" | grep -o 'https://[^[:space:]]*' | head -1)
          fi
          
          if [ -z "$URL" ]; then
            echo "skip=true" >> $GITHUB_OUTPUT
            echo "::notice::No link found in Issue body or title. Stopping."
            exit 0
          fi
          
          echo "download_url=$URL" >> $GITHUB_OUTPUT
          echo "Link extracted: $URL"

      - name: Create downloads folder
        if: steps.get-url.outputs.skip != 'true'
        run: mkdir -p downloads

      - name: Download file
        id: download-file
        if: steps.get-url.outputs.skip != 'true'
        env:
          DOWNLOAD_URL: ${{ steps.get-url.outputs.download_url }}
        run: |
          URL="${DOWNLOAD_URL}"
          
          FILENAME="${URL##*/}"
          FILENAME="${FILENAME%%\?*}"
          
          if [ -z "$FILENAME" ] || [ "$FILENAME" = "/" ]; then
            FILENAME="download_$(date +%s)"
          fi

          if [ -f "downloads/${FILENAME}" ]; then
            BASE="${FILENAME%.*}"
            EXT="${FILENAME##*.}"
            COUNTER=1
            while [ -f "downloads/${BASE}_${COUNTER}.${EXT}" ]; do
              COUNTER=$((COUNTER + 1))
            done
            FILENAME="${BASE}_${COUNTER}.${EXT}"
          fi

          echo "Downloading file as: ${FILENAME}"
          curl -L -f --retry 5 --retry-delay 5 \
            -A "GitHub-Actions-Downloader/1.0" \
            -o "downloads/${FILENAME}" \
            "${URL}"

          if [ $? -ne 0 ]; then
            echo "::error::Download failed for ${URL}"
            exit 1
          fi

          echo "filename=${FILENAME}" >> $GITHUB_OUTPUT
          echo "Download successful: ${FILENAME}"

      - name: Commit and push file
        if: steps.download-file.outputs.filename != ''
        env:
          FILENAME: ${{ steps.download-file.outputs.filename }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          
          git add "downloads/${FILENAME}"
          
          if git diff --cached --quiet; then
            echo "No changes to commit."
            exit 0
          fi
          
          git commit -m "Download: ${FILENAME}"
          
          for i in $(seq 1 5); do
            git pull --rebase origin main && git push && break || sleep 5
          done
          
          echo "File successfully saved: ${FILENAME}"

      - name: Comment download link on Issue
        if: steps.download-file.outputs.filename != ''
        uses: peter-evans/create-or-update-comment@v4
        with:
          issue-number: ${{ github.event.issue.number }}
          body: |
            ## ✅ File downloaded successfully!

            📁 **Filename:** `${{ steps.download-file.outputs.filename }}`

            📥 **Direct download link:**
            
            https://github.com/${{ github.repository }}/raw/main/downloads/${{ steps.download-file.outputs.filename }}

            ⏰ Time remaining until cleanup: End of today (23:59 UTC)
            
            ---
            *🤖 This message was sent by the downloader bot.*

      - name: Close Issue
        if: steps.download-file.outputs.filename != ''
        uses: peter-evans/close-issue@v3
        with:
          issue-number: ${{ github.event.issue.number }}
          comment: "✅ Request processed successfully and Issue closed."

      - name: Comment error if no link found
        if: steps.get-url.outputs.skip == 'true'
        uses: peter-evans/create-or-update-comment@v4
        with:
          issue-number: ${{ github.event.issue.number }}
          body: |
            ## ⚠️ Error: No link found
            
            Please create a new Issue with a **direct download link**.
            [Create New Issue](https://github.com/${{ github.repository }}/issues/new?template=download-request.md)
            
            ---
            *🤖 This message was sent by the downloader bot.*
