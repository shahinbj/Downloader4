name: Auto Download from Issue

on:
  issues:
    types: [opened]

permissions:
  contents: write
  issues: write

concurrency:
  group: download-bot-${{ github.event.issue.number }}
  cancel-in-progress: false

jobs:
  download-and-reply:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: main

      - name: Extract URL from Issue
        id: get-url
        run: |
          BODY=$(cat << 'EOF'
          ${{ github.event.issue.body }}
          EOF
          )
          
          TITLE="${{ github.event.issue.title }}"
          
          URL=$(echo "$BODY" | grep -o 'https://[^[:space:]]*' | head -1)
          
          if [ -z "$URL" ]; then
            URL=$(echo "$TITLE" | grep -o 'https://[^[:space:]]*' | head -1)
          fi
          
          if [ -z "$URL" ]; then
            echo "skip=true" >> $GITHUB_OUTPUT
            echo "::notice::No link found in Issue body or title. Stopping."
            exit 0
          fi
          
          echo "download_url=$URL" >> $GITHUB_OUTPUT
          echo "Link extracted: $URL"

      - name: Create downloads folder
        if: steps.get-url.outputs.skip != 'true'
        run: mkdir -p downloads

      - name: Download file
        id: download-file
        if: steps.get-url.outputs.skip != 'true'
        env:
          DOWNLOAD_URL: ${{ steps.get-url.outputs.download_url }}
        run: |
          URL="${DOWNLOAD_URL}"
          
          FILENAME="${URL##*/}"
          FILENAME="${FILENAME%%\?*}"
          
          if [ -z "$FILENAME" ] || [ "$FILENAME" = "/" ]; then
            FILENAME="download_$(date +%s)"
          fi

          echo "Downloading file as: ${FILENAME}"
          curl -L -f --retry 5 --retry-delay 5 \
            -A "GitHub-Actions-Downloader/1.0" \
            -o "downloads/${FILENAME}" \
            "${URL}"

          if [ $? -ne 0 ]; then
            echo "::error::Download failed for ${URL}"
            exit 1
          fi

          echo "Download successful: ${FILENAME}"
          
          SIZE=$(stat -c%s "downloads/${FILENAME}")
          SIZE_MB=$((SIZE / 1024 / 1024))
          
          echo "size_bytes=${SIZE}" >> $GITHUB_OUTPUT
          echo "size_mb=${SIZE_MB}" >> $GITHUB_OUTPUT
          echo "filename=${FILENAME}" >> $GITHUB_OUTPUT
          
          echo "File size: ${SIZE_MB} MB"

      - name: Split large file into ZIP parts
        id: split-file
        if: steps.download-file.outputs.size_mb > 90
        env:
          FILENAME: ${{ steps.download-file.outputs.filename }}
        run: |
          echo "File is larger than 90 MB. Splitting into parts..."
          
          BASENAME="${FILENAME%.*}"
          SPLIT_DIR="downloads/${BASENAME}_parts"
          mkdir -p "${SPLIT_DIR}"
          
          gzip -c "downloads/${FILENAME}" > "${SPLIT_DIR}/${FILENAME}.gz"
          
          split -b 90M -d "${SPLIT_DIR}/${FILENAME}.gz" "${SPLIT_DIR}/${FILENAME}.part_"
          
          rm "${SPLIT_DIR}/${FILENAME}.gz"
          
          for part in "${SPLIT_DIR}"/*; do
            mv "${part}" "${part}.zip"
          done
          
          rm "downloads/${FILENAME}"
          
          PART_COUNT=$(ls -1 "${SPLIT_DIR}" | wc -l)
          echo "part_count=${PART_COUNT}" >> $GITHUB_OUTPUT
          echo "split=true" >> $GITHUB_OUTPUT
          echo "basename=${BASENAME}" >> $GITHUB_OUTPUT
          echo "split_dir=${SPLIT_DIR}" >> $GITHUB_OUTPUT
          
          echo "File split into ${PART_COUNT} parts in: ${SPLIT_DIR}"

      - name: Commit and push all files
        if: steps.download-file.outputs.filename != ''
        env:
          FILENAME: ${{ steps.download-file.outputs.filename }}
          SPLIT: ${{ steps.split-file.outputs.split }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          
          git add downloads/
          
          if git diff --cached --quiet; then
            echo "No changes to commit."
            exit 0
          fi
          
          if [ "${SPLIT}" = "true" ]; then
            git commit -m "Download and split: ${FILENAME}"
          else
            git commit -m "Download: ${FILENAME}"
          fi
          
          for i in $(seq 1 5); do
            git pull --rebase origin main && git push && break || sleep 5
          done
          
          echo "File(s) successfully saved to repository."

      - name: Comment download link on Issue (normal file)
        if: steps.download-file.outputs.filename != '' && steps.split-file.outputs.split != 'true'
        uses: peter-evans/create-or-update-comment@v4
        with:
          issue-number: ${{ github.event.issue.number }}
          body: |
            ## ✅ File downloaded successfully!

            📁 **Filename:** `${{ steps.download-file.outputs.filename }}`
            
            📊 **Size:** ${{ steps.download-file.outputs.size_mb }} MB

            📥 **Direct download link:**
            
            https://github.com/${{ github.repository }}/raw/main/downloads/${{ steps.download-file.outputs.filename }}

            ⏰ Time remaining until cleanup: End of today (23:59 UTC)

      - name: Generate links and comment for split files
        if: steps.split-file.outputs.split == 'true'
        env:
          REPO: ${{ github.repository }}
          SPLIT_DIR: ${{ steps.split-file.outputs.split_dir }}
        run: |
          echo "## ✅ Large file downloaded and split successfully!" > /tmp/comment-body.md
          echo "" >> /tmp/comment-body.md
          echo "📁 **Original filename:** \`${{ steps.download-file.outputs.filename }}\`" >> /tmp/comment-body.md
          echo "" >> /tmp/comment-body.md
          echo "📊 **Original size:** ${{ steps.download-file.outputs.size_mb }} MB" >> /tmp/comment-body.md
          echo "" >> /tmp/comment-body.md
          echo "---" >> /tmp/comment-body.md
          echo "" >> /tmp/comment-body.md
          echo "### 📥 Direct download links:" >> /tmp/comment-body.md
          echo "" >> /tmp/comment-body.md
          
          for part in ${SPLIT_DIR}/*; do
            PART_NAME=$(basename "${part}")
            echo "https://github.com/${REPO}/raw/main/${SPLIT_DIR}/${PART_NAME}" >> /tmp/comment-body.md
            echo "" >> /tmp/comment-body.md
          done
          
          echo "---" >> /tmp/comment-body.md
          echo "" >> /tmp/comment-body.md
          echo "⏰ Time remaining until cleanup: End of today (23:59 UTC)" >> /tmp/comment-body.md
          
          cat /tmp/comment-body.md

      - name: Post comment for split files
        if: steps.split-file.outputs.split == 'true'
        uses: peter-evans/create-or-update-comment@v4
        with:
          issue-number: ${{ github.event.issue.number }}
          body-file: /tmp/comment-body.md

      - name: Close Issue
        if: steps.download-file.outputs.filename != ''
        uses: peter-evans/close-issue@v3
        with:
          issue-number: ${{ github.event.issue.number }}
          comment: "✅ Request processed successfully and Issue closed."

      - name: Comment error if no link found
        if: steps.get-url.outputs.skip == 'true'
        uses: peter-evans/create-or-update-comment@v4
        with:
          issue-number: ${{ github.event.issue.number }}
          body: |
            ## ⚠️ Error: No link found
            
            Please create a new Issue with a **direct download link**.
            [Create New Issue](https://github.com/${{ github.repository }}/issues/new?template=download-request.md)
